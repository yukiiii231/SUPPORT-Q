<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auth</title>
<script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
</head>

<body>

<script>

const msalConfig = {
    auth:{
        clientId:"8301da4c-08bd-4aed-bcce-67a766ba3367",
        authority:"https://login.microsoftonline.com/common",
        redirectUri:"https://yukiiii231.github.io/SUPPORT-Q/auth.html"
    }
}

const msalInstance = new msal.PublicClientApplication(msalConfig)

async function processLogin(){
    try{
        console.log("Starting auth process...");
        
        const response = await msalInstance.handleRedirectPromise()
        let account

        if(response){
            console.log("Login response received.");
            account = response.account
        } else {
            const accounts = msalInstance.getAllAccounts()
            if(accounts.length > 0){
                account = accounts[0]
                console.log("Existing account found.");
            }
        }

        if(!account){
            console.log("No account found. Redirecting to homepage.");
            window.location.href = "homepage.html"
            return
        }

        const role = localStorage.getItem("loginRole")
        const email = account.username.toLowerCase()
        
        console.log("Role from localStorage:", role);
        console.log("User Email:", email);

        // Check Role and Email Domain
        if(role === "student" && email.endsWith("@fairview.sti.edu.ph")){
            console.log("Redirecting to Student Dashboard");
            window.location.href = "student_dashboard.html"
            return
        }

        if(role === "admin" && email.endsWith("@fairview.sti.edu.ph")){
            console.log("Redirecting to Admin Dashboard");
            window.location.href = "admin_dashboard.html"
            return
        }

        // If role doesn't match email domain
        console.log("Role/Email mismatch. Redirecting to homepage.");
        window.location.href = "homepage.html"

    }catch(error){
        console.error("Auth Error:", error)
        window.location.href = "homepage.html"
    }
}

processLogin()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Authenticating...</title>
    <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
    <script>
        const msalInstance = new msal.PublicClientApplication({
            auth: { clientId: "8301da4c-08bd-4aed-bcce-67a766ba3367", authority: "https://login.microsoftonline.com/common" }
        });
        msalInstance.initialize().then(() => {
            // This will signal the main window that login is done and close the popup
            msalInstance.handleRedirectPromise();
        });
    </script>
</head>
<body></body>
</html>
